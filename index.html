<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
    --bg-color: #0f0f0f;
    --surface-color: #1a1a1a;
    --accent-color: #EE5454; /* Lime accent */
    --text-muted: #888;
    --text-main: #f0f0f0;
}

body {
    background-color: var(--bg-color);
    color: var(--text-main);
    font-family: 'Fira Code', 'Courier New', monospace;
    display: flex;
    justify-content: center;
    padding: 2rem;
}

.container { width: 100%; max-width: 500px; }

header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

#task-count { color: var(--accent-color); font-weight: bold; }


#todo-form { display: flex; gap: 10px; margin-bottom: 30px; }
#todo-input {
    flex: 1;
    background: var(--surface-color);
    border: 1px solid #333;
    color: white;
    padding: 10px;
    font-family: inherit;
}
#todo-form button {
    background: var(--accent-color);
    color: #000;
    border: none;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: bold;
}


.filters { display: flex; gap: 10px; }
.filter-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text-muted);
    border-radius: 99px;
    padding: 5px 15px;
    cursor: pointer;
    font-family: inherit;
}
.filter-btn.active { border-color: var(--accent-color); color: var(--accent-color); }


.task-card {
    background: var(--surface-color);
    border: 1px solid #333;
    display: flex;
    align-items: center;
    padding: 0 15px;
    margin-bottom: 10px;
    min-height: 48px;
    animation: fadeIn 0.3s ease;
    transition: all 0.3s ease;
}

.task-card.terminee {
    background: #0a240a;
    opacity: 0.6;
}

.task-card.terminee .task-text { text-decoration: line-through; }

.checkbox {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--accent-color);
    margin-right: 15px;
    cursor: pointer;
}

.task-card.terminee .checkbox::after { content: '✓'; display: block; text-align: center; font-size: 14px; }

.task-text { flex: 1; }

.delete-btn { background: none; border: none; color: red; font-size: 20px; cursor: pointer; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Tasks <span id="task-count">0</span></h1>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Toutes</button>
                <button class="filter-btn" data-filter="active">Actives</button>
                <button class="filter-btn" data-filter="completed">Terminées</button>
            </div>
        </header>

        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Nouvelle tâche..." autocomplete="off">
            <button type="submit">Ajouter</button>
        </form>

        <div id="task-list"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
